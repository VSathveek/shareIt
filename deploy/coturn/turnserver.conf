# Self-hosted coturn — the TURN cost-control path for scale (Phase 14).
# Use when managed-TURN bandwidth spend justifies owning the relay. Deploy near users.
#
# The signaling server mints short-TTL credentials against `static-auth-secret`; set the SAME
# value as the service's TURN_SECRET env var, and point TURN_URLS at this server.

listening-port=3478
tls-listening-port=5349

# Advertise the server's PUBLIC IP (set on deploy).
external-ip=REPLACE_WITH_PUBLIC_IP

# Time-limited credentials (coturn REST / use-auth-secret) — matches turn/credentials.ts.
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SECRET

realm=shareit.turn

# Abuse hardening: relay only, no loopback/multicast, deny private ranges.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Reasonable ceilings; tune per instance.
total-quota=1200
stale-nonce=600
fingerprint

# TLS (recommended): point at real certs in production.
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem
